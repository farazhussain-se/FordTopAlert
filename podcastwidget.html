<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive with Jim Farley – YouTube</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 10px; }

        .yt-wrap {
            width: 100%;
            max-width: 100%;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 2px 16px rgba(0,0,0,0.2);
        }

        /* 16:9 responsive ratio */
        .yt-ratio {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            height: 0;
        }
        .yt-ratio iframe {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            border: none;
            display: block;
        }

        .yt-footer {
            background: #1c1c1e;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .yt-label {
            display: flex; align-items: center; gap: 8px;
        }
        .yt-chip {
            background: #FF0000; color: white;
            font-size: 8px; font-weight: 900;
            letter-spacing: 0.06em; padding: 2px 6px;
            border-radius: 3px;
        }
        .yt-title {
            font-size: 11px; font-weight: 700; color: white;
        }
        .yt-sub {
            font-size: 9px; color: rgba(255,255,255,0.4);
        }
        .yt-btn {
            font-size: 10px; font-weight: 700;
            color: #FF0000; text-decoration: none;
            white-space: nowrap;
        }
        .yt-btn:hover { opacity: 0.8; }
    </style>
</head>
<body>

<div class="yt-wrap">
    <div class="yt-ratio">
        <iframe
            src="https://www.youtube.com/embed/videoseries?list=PLNxyx7CkolE_fUVGV0R5PQTFZAAL31mbf&rel=0&modestbranding=1"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            allowfullscreen>
        </iframe>
    </div>
    <div class="yt-footer">
        <div class="yt-label">
            <span class="yt-chip">YouTube</span>
            <div>
                <div class="yt-title">Drive with Jim Farley</div>
                <div class="yt-sub">Full playlist · Auto-plays latest episode</div>
            </div>
        </div>
        <a class="yt-btn"
           href="https://www.youtube.com/playlist?list=PLNxyx7CkolE_fUVGV0R5PQTFZAAL31mbf"
           target="_blank">Watch on YouTube ↗</a>
    </div>
</div>

</body>
</html>
