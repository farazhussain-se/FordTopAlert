<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drive with Jim Farley – Latest Episode</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; padding: 10px; }

        .player { background: #1c1c1e; border-radius: 14px; overflow: hidden; max-width: 100%; color: white; }

        /* ── Spinner ── */
        .spinner-wrap {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 40px 20px; gap: 14px;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #fc3c44;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner-label { font-size: 11px; color: rgba(255,255,255,0.4); font-weight: 600; letter-spacing: 0.03em; }

        /* ── Content ── */
        .player-top { display:flex; gap:14px; align-items:flex-start; padding:18px 18px 12px; }
        .pod-art { width:80px; height:80px; border-radius:10px; object-fit:cover; background:#333; flex-shrink:0; }
        .pod-info { flex:1; min-width:0; }
        .pod-eyebrow { font-size:9px; font-weight:800; color:#fc3c44; text-transform:uppercase; letter-spacing:0.08em; display:flex; align-items:center; gap:5px; margin-bottom:5px; }
        .live-dot { width:6px; height:6px; border-radius:50%; background:#fc3c44; animation:pulse 2s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        .pod-title { font-size:14px; font-weight:700; line-height:1.35; color:white; margin-bottom:4px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .pod-show { font-size:11px; color:rgba(255,255,255,0.4); }
        .pod-desc { font-size:12px; color:rgba(255,255,255,0.5); line-height:1.55; padding:0 18px 14px; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; }
        .audio-wrap { padding:0 18px 14px; }
        audio { width:100%; height:40px; display:block; border-radius:8px; outline:none; accent-color:#fc3c44; }
        .pod-footer { display:flex; justify-content:space-between; align-items:center; padding:10px 18px 16px; border-top:1px solid rgba(255,255,255,0.07); flex-wrap:wrap; gap:8px; }
        .pod-meta { display:flex; gap:12px; }
        .pod-meta span { font-size:10px; color:rgba(255,255,255,0.35); }
        .apple-btn { display:inline-flex; align-items:center; gap:5px; background:#fc3c44; color:white; font-size:10px; font-weight:800; padding:6px 13px; border-radius:99px; text-decoration:none; }
        .apple-btn:hover { opacity:0.85; }
        .debug-bar { padding:6px 18px 10px; font-size:9px; color:rgba(255,255,255,0.2); }

        /* ── Error ── */
        .error-state { padding:28px 18px; text-align:center; }
        .error-state p { font-size:12px; color:rgba(255,255,255,0.45); line-height:1.8; }
        .error-state a { color:#fc3c44; font-weight:700; }
    </style>
</head>
<body>
<div class="player" id="player">

    <!-- Spinner -->
    <div id="skel" class="spinner-wrap">
        <div class="spinner"></div>
        <span class="spinner-label">Loading latest episode…</span>
    </div>

    <!-- Content -->
    <div id="content" style="display:none;">
        <div class="player-top">
            <img class="pod-art" id="pod-art" src="" alt="Episode art" onerror="this.style.display='none'">
            <div class="pod-info">
                <div class="pod-eyebrow"><div class="live-dot"></div>Latest Episode</div>
                <div class="pod-title" id="pod-title"></div>
                <div class="pod-show">Drive with Jim Farley</div>
            </div>
        </div>
        <div class="pod-desc" id="pod-desc"></div>
        <div class="audio-wrap">
            <audio id="pod-audio" controls preload="none"></audio>
        </div>
        <div class="pod-footer">
            <div class="pod-meta">
                <span id="pod-date"></span>
                <span id="pod-dur"></span>
            </div>
            <a class="apple-btn" id="pod-link"
               href="https://podcasts.apple.com/us/podcast/drive-with-jim-farley/id1647604558"
               target="_blank">🎙 Apple Podcasts</a>
        </div>
        <div class="debug-bar" id="debug-bar"></div>
    </div>

    <!-- Error -->
    <div id="err" style="display:none;" class="error-state">
        <p>🎙<br><br>Could not load the latest episode.<br>
           <a href="https://podcasts.apple.com/us/podcast/drive-with-jim-farley/id1647604558"
              target="_blank">Open in Apple Podcasts ↗</a><br><br>
           <span id="err-detail" style="font-size:9px;opacity:0.5;"></span></p>
    </div>
</div>

<script>
    var FEED = 'https://feeds.megaphone.fm/drive-podcast-spot';
    var STRATEGIES = [
        {
            name: 'rss2json',
            url: function() { return 'https://api.rss2json.com/v1/api.json?rss_url=' + encodeURIComponent(FEED) + '&count=1'; },
            parse: function(data) {
                if (data.status !== 'ok' || !data.items || !data.items.length) throw new Error('bad data');
                var ep = data.items[0];
                return {
                    title: ep.title,
                    desc:  strip(ep.description || ep.content || ''),
                    audio: ep.enclosure && ep.enclosure.link ? ep.enclosure.link : '',
                    date:  fmtDate(ep.pubDate),
                    dur:   fmtDur(ep.itunes_duration || ''),
                    art:   ep.thumbnail || data.feed.image || '',
                    link:  ep.link || ''
                };
            }
        },
        {
            name: 'corsproxy.io',
            url: function() { return 'https://corsproxy.io/?' + encodeURIComponent(FEED); },
            parse: function(text) { return parseXML(text); }
        },
        {
            name: 'allorigins',
            url: function() { return 'https://api.allorigins.win/get?url=' + encodeURIComponent(FEED); },
            parse: function(data) { return parseXML(data.contents || data); }
        }
    ];

    function strip(html) {
        var d = document.createElement('div');
        d.innerHTML = html || '';
        return (d.textContent || d.innerText || '').trim();
    }
    function fmtDate(str) {
        if (!str) return '';
        try { return new Date(str).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}); }
        catch(e) { return str; }
    }
    function fmtDur(s) {
        if (!s) return '';
        var n = parseInt(s,10);
        if (isNaN(n)) return '';
        var h = Math.floor(n/3600), m = Math.floor((n%3600)/60);
        return h > 0 ? h+'h '+m+'m' : m+' min';
    }
    function parseXML(xmlStr) {
        var parser = new DOMParser();
        var xml = parser.parseFromString(xmlStr,'text/xml');
        var item = xml.querySelector('item');
        if (!item) throw new Error('no item');
        var get = function(tag){ var el=item.querySelector(tag); return el?el.textContent.trim():''; };
        var encl = item.querySelector('enclosure');
        var ns = 'http://www.itunes.com/dtds/podcast-1.0.dtd';
        var durEl = item.getElementsByTagNameNS(ns,'duration')[0];
        var artEl = item.getElementsByTagNameNS(ns,'image')[0]
                 || (xml.querySelector('channel') && xml.querySelector('channel').getElementsByTagNameNS(ns,'image')[0]);
        return {
            title: get('title'),
            desc:  strip(get('description')),
            audio: encl ? encl.getAttribute('url') : '',
            date:  fmtDate(get('pubDate')),
            dur:   fmtDur(durEl ? durEl.textContent : ''),
            art:   artEl ? (artEl.getAttribute('href') || artEl.textContent) : '',
            link:  get('link')
        };
    }

    function populate(ep, source) {
        document.getElementById('pod-title').textContent = ep.title || 'Latest Episode';
        document.getElementById('pod-desc').textContent  = ep.desc  || '';
        document.getElementById('pod-date').textContent  = ep.date  || '';
        document.getElementById('pod-dur').textContent   = ep.dur   || '';
        if (ep.audio) document.getElementById('pod-audio').src = ep.audio;
        if (ep.art)   document.getElementById('pod-art').src   = ep.art;
        if (ep.link)  document.getElementById('pod-link').href = ep.link;
        document.getElementById('debug-bar').textContent = 'via ' + source;
        document.getElementById('skel').style.display    = 'none';
        document.getElementById('content').style.display = 'block';
    }

    function tryStrategy(index, errors) {
        if (index >= STRATEGIES.length) {
            document.getElementById('skel').style.display = 'none';
            document.getElementById('err').style.display  = 'block';
            document.getElementById('err-detail').textContent = errors.join(' | ');
            return;
        }
        var s = STRATEGIES[index];
        fetch(s.url())
            .then(function(r) {
                if (!r.ok) throw new Error(s.name + ' HTTP ' + r.status);
                return s.name === 'corsproxy.io' ? r.text() : r.json();
            })
            .then(function(data) {
                var ep = s.parse(data);
                populate(ep, s.name);
            })
            .catch(function(e) {
                errors.push(s.name + ': ' + e.message);
                tryStrategy(index + 1, errors);
            });
    }

    tryStrategy(0, []);
</script>
</body>
</html>
